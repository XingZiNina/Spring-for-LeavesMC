name: SpringLeaves Build

on:
  push:
    branches: [ "dev/1.21.11" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: never
          cache-read-only: false

      - name: Setup Git
        run: |
          git config --global user.email "ci@springleaves.dev"
          git config --global user.name "SpringLeaves CI"

      - name: Apply Patches
        run: ./gradlew applyAllPatches

      - name: Build
        run: ./gradlew createMojmapBundlerJar

      - name: Rename Jar
        run: |
          mcVer=$(awk -F= '/mcVersion/ {gsub(/ /, "", $2); print $2}' gradle.properties)
          mv leaves-server/build/libs/leaves-bundler-*-mojmap.jar "SpringLeaves-${mcVer}.jar"
          echo "jar=SpringLeaves-${mcVer}.jar" >> "$GITHUB_ENV"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.jar }}
          path: ${{ env.jar }}
